name: Publish Gig

on:
  repository_dispatch:
    types: [formspree-gig-submission]
  workflow_dispatch:
    inputs:
      submission_json:
        description: 'JSON payload of gig submission'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Process gig submission
        run: |
          python scrapers/sources/process_gig.py '${{ github.event.client_payload.submission || github.event.inputs.submission_json }}'

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add src/_data/gigs.json scrapers/logs/
          git diff --staged --quiet || git commit -m "Auto-publish new gig listing"
          git push
