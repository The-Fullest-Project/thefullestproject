name: Weekly Scrape and Deploy

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers
        run: python scrapers/run_all.py

      - name: Fetch positive stories
        run: python scrapers/sources/positive_stories.py

      - name: Discover spotlight organizations
        run: python scrapers/sources/spotlight_scraper.py

      - name: Fetch blog content
        run: python scrapers/sources/blog_content.py

      - name: Expire old gigs and generate notifications
        run: python scrapers/sources/process_gig.py --expire

      - name: Weekly gig digest
        run: python scrapers/sources/process_gig.py --digest

      - name: Send gig expiry notifications
        run: |
          if [ -f scrapers/logs/expiry_notifications.json ]; then
            echo "Expiring gigs found — notifications saved to scrapers/logs/expiry_notifications.json"
            cat scrapers/logs/expiry_notifications.json
          else
            echo "No gigs expiring soon"
          fi

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add src/_data/resources/ src/_data/stories.json src/_data/spotlights.json src/_data/gigs.json src/blog/ scrapers/logs/
          git diff --staged --quiet || git commit -m "Weekly scrape: update resources, stories, spotlights, blog, and gigs"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
