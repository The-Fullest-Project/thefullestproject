<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Review Portal | The Fullest Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/output.css">
</head>
<body class="min-h-screen" style="background-color: var(--color-warm-light);">
  <a href="#portal-main" class="skip-nav">Skip to main content</a>

  <!-- Login view -->
  <div id="login-view" class="min-h-screen flex items-center justify-center px-4">
    <div class="card p-8 max-w-md w-full text-center">
      <h1 class="text-2xl font-bold mb-2" style="color: var(--color-primary);">TFP Review Portal</h1>
      <p class="text-sm mb-6" style="color: var(--color-text-light);">Sign in with the GitHub account that has access to the site repository.</p>
      <button id="sign-in-btn" type="button" class="btn-primary w-full text-center">Sign in with GitHub</button>
      <p id="login-status" class="text-sm mt-4 min-h-5" aria-live="polite" style="color: var(--color-text-light);"></p>
      <details class="mt-6 text-left">
        <summary class="text-sm cursor-pointer" style="color: var(--color-accent);">Trouble signing in? Use a personal access token</summary>
        <div class="mt-3 flex flex-col gap-2">
          <label for="pat-input" class="sr-only">GitHub personal access token</label>
          <input type="password" id="pat-input" class="form-input text-sm" placeholder="ghp_... or github_pat_...">
          <button id="pat-btn" type="button" class="btn-secondary text-sm">Use token</button>
        </div>
      </details>
    </div>
  </div>

  <!-- App view -->
  <div id="app-view" hidden>
    <header class="sticky top-0 z-40 shadow-sm" style="background-color: var(--color-primary);">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3 text-white">
        <div class="flex items-center gap-4 min-w-0">
          <span class="font-bold whitespace-nowrap" style="font-family: var(--font-heading);">TFP Review Portal</span>
          <a href="/admin/" class="text-sm underline opacity-80 hover:opacity-100 hidden sm:inline">Content Manager</a>
        </div>
        <div class="flex items-center gap-3">
          <img id="user-avatar" class="w-8 h-8 rounded-full" src="" alt="" hidden>
          <span id="user-login" class="text-sm hidden sm:inline"></span>
          <button id="sign-out-btn" type="button" class="text-sm underline opacity-80 hover:opacity-100">Sign out</button>
        </div>
      </div>
      <nav class="max-w-6xl mx-auto px-4 overflow-x-auto">
        <div role="tablist" aria-label="Admin sections" class="flex gap-1 pb-2">
          <button role="tab" id="tab-queue" aria-controls="panel-queue" aria-selected="true"
            class="px-4 py-2 rounded-t-lg text-sm font-semibold whitespace-nowrap bg-white" style="color: var(--color-primary);">Review Queue <span id="queue-count-badge" class="tag" hidden></span></button>
          <button role="tab" id="tab-history" aria-controls="panel-history" aria-selected="false"
            class="px-4 py-2 rounded-t-lg text-sm font-semibold whitespace-nowrap text-white/80 hover:text-white">Recently Added</button>
          <button role="tab" id="tab-bulk" aria-controls="panel-bulk" aria-selected="false"
            class="px-4 py-2 rounded-t-lg text-sm font-semibold whitespace-nowrap text-white/80 hover:text-white">Bulk Import</button>
          <button role="tab" id="tab-emails" aria-controls="panel-emails" aria-selected="false"
            class="px-4 py-2 rounded-t-lg text-sm font-semibold whitespace-nowrap text-white/80 hover:text-white">Emails</button>
        </div>
      </nav>
    </header>

    <main id="portal-main" class="max-w-6xl mx-auto px-4 py-8">
      <section role="tabpanel" id="panel-queue" aria-labelledby="tab-queue"></section>
      <section role="tabpanel" id="panel-history" aria-labelledby="tab-history" hidden></section>
      <section role="tabpanel" id="panel-bulk" aria-labelledby="tab-bulk" hidden></section>
      <section role="tabpanel" id="panel-emails" aria-labelledby="tab-emails" hidden></section>
    </main>
  </div>

  <div id="toast-region" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 items-center" aria-live="polite"></div>

  <script src="/admin/review/papaparse.min.js"></script>
  <script src="/admin/review/portal.js"></script>
</body>
</html>
