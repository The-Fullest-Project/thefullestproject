name = "decap-oauth"
main = "worker.js"
compatibility_date = "2024-10-01"

# Set these via the Cloudflare dashboard or `wrangler secret put`:
#   GITHUB_CLIENT_ID     — OAuth App client id (can also be a plain var)
#   GITHUB_CLIENT_SECRET — OAuth App client secret (MUST be a secret)
#   ALLOWED_ORIGIN       — "https://thefullestproject.org"
